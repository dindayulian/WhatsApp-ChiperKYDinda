<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>WhatsApp Cipher KY</title>

<link rel="stylesheet" href="css/style.css">

<style>

body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#25D366,#128C7E);
}

.splash{
    text-align:center;
    color:white;
}

.splash img{
    width:140px;
    animation:zoom 1.5s infinite alternate;
}

.splash h1{
    margin-top:20px;
    font-size:36px;
}

.splash p{
    font-size:18px;
    opacity:.9;
}

.loader{
    width:50px;
    height:50px;
    border:5px solid rgba(255,255,255,.3);
    border-top:5px solid white;
    border-radius:50%;
    margin:25px auto;
    animation:spin 1s linear infinite;
}

@keyframes spin{
    100%{
        transform:rotate(360deg);
    }
}

@keyframes zoom{
    from{
        transform:scale(1);
    }
    to{
        transform:scale(1.1);
    }
}

</style>

</head>
<body>

<div class="splash">

    <img src="assets/logo.png">

    <h1>WhatsApp Cipher KY</h1>

    <p>
        Pengiriman Pesan Menggunakan
        Cipher Transposisi (C)
    </p>

    <div class="loader"></div>

</div>

<script>

setTimeout(()=>{

    window.location.href="home.html";

},3000);

</script>

</body>
</html>
