<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Dekripsi Pesan</title>

<link rel="stylesheet"
href="css/style.css">

</head>
<body>

<div class="page">

<h1>🔓 Dekripsi Pesan</h1>

<div class="form-group">

<label>Ciphertext</label>

<textarea
id="ciphertext"></textarea>

</div>

<div class="form-group">

<label>Kunci (A)</label>

<input
type="number"
id="key">

</div>

<button
class="btn decrypt-btn"
onclick="decryptMessage()">

Dekripsi

</button>

<div class="form-group result">

<label>Plaintext</label>

<textarea
id="plaintext"
readonly></textarea>

</div>

<button
class="btn back-btn"
onclick="location.href='index.html'">

Kembali

</button>

</div>

<script src="js/cipher.js"></script>
<script src="js/decrypt.js"></script>

</body>
</html>
